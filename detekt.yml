build:
  maxIssues: 0 # Build fails entirely if ANY issue is found
  weights:
    complexity: 2
    formatting: 1
    LongParameterList: 1
    style: 1
    comments: 1

potential-bugs:
  active: true
  ImplicitDefaultLocale:
    active: true
  UnsafeCallOnNullableType:
    active: true
  CastToNullableType:
    active: true

complexity:
  active: true
  TooManyFunctions:
    active: true
    thresholdInFiles: 20
    thresholdInClasses: 20
    thresholdInInterfaces: 20
    thresholdInObjects: 20
    thresholdInEnums: 20
    ignoreDeprecated: false
    ignorePrivate: false
    ignoreOverridden: false
  ComplexCondition:
    active: true
    threshold: 4
  ComplexMethod:
    active: true
    threshold: 15
  LongMethod:
    active: true
    threshold: 60
  LongParameterList:
    active: true
    functionThreshold: 6
    constructorThreshold: 7

style:
  active: true
  WildcardImport:
    active: true
    excludeImports: ['java.util.*', 'kotlinx.android.synthetic.*']
  MaxLineLength:
    active: true
    maxLineLength: 120
    excludePackageStatements: true
    excludeImportStatements: true
    excludeCommentStatements: false
  MagicNumber:
    active: true
    ignoreNumbers: ['-1', '0', '1', '2', '100', '1000']
    ignoreHashCodeFunction: true
    ignorePropertyDeclaration: true
    ignoreLocalVariableDeclaration: false
    ignoreConstantDeclaration: true
    ignoreCompanionObjectPropertyDeclaration: true
    ignoreAnnotation: true
    ignoreNamedArgument: true
    ignoreEnums: true
  ReturnCount:
    active: true
    max: 2
    excludeGuardClauses: false
    excludeUseFunction: false
    excludeRunFunction: false
    excludeCatchBlocks: false
  ForbiddenComment:
    active: true
    values: ['TODO:', 'FIXME:', 'STOPSHIP:']
  ForbiddenMethodCall:
    active: true
    methods:
      - reason: 'Logs are strictly forbidden per user requirements. Use Timber instead.'
        value: 'android.util.Log.v'
      - reason: 'Logs are strictly forbidden per user requirements. Use Timber instead.'
        value: 'android.util.Log.d'
      - reason: 'Logs are strictly forbidden per user requirements. Use Timber instead.'
        value: 'android.util.Log.i'
      - reason: 'Logs are strictly forbidden per user requirements. Use Timber instead.'
        value: 'android.util.Log.w'
      - reason: 'Logs are strictly forbidden per user requirements. Use Timber instead.'
        value: 'android.util.Log.e'
      - reason: 'Logs are strictly forbidden per user requirements. Use Timber instead.'
        value: 'android.util.Log.wtf'
      - reason: 'System.out.println is strictly forbidden.'
        value: 'java.io.PrintStream.println'

formatting:
  active: true
  MaximumLineLength:
    active: true
    maxLineLength: 120
  NoUnusedImports:
    active: true
  NoEmptyClassBody:
    active: true
